name: 📡 Fetch Telegram Channel

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Channel username (without @)'
        required: true
        type: string
      count:
        description: 'Number of messages to fetch'
        required: false
        default: '100'
        type: string

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch channel
        run: |
          python scripts/fetch_channel.py \
            --channel "${{ github.event.inputs.channel }}" \
            --count "${{ github.event.inputs.count }}"

      - name: Rename output file
        run: |
          CHANNEL="${{ github.event.inputs.channel }}"
          DATE=$(date +'%Y-%m-%d_%H-%M')
          mv output/index.html "output/${CHANNEL}_${DATE}.html"
          echo "FILENAME=${CHANNEL}_${DATE}.html" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "channel-${{ github.event.inputs.channel }}-${{ github.run_number }}"
          name: "📡 @${{ github.event.inputs.channel }} — ${{ github.event.inputs.count }} پیام"
          body: |
            ## کانال: @${{ github.event.inputs.channel }}

            فایل HTML رو دانلود کن و توی مرورگرت باز کن.

            - 📨 تعداد پیام: ${{ github.event.inputs.count }}
            - 🕐 زمان دریافت: ${{ github.run_started_at }}

            > ⚠️ عکس‌ها و ویدیوها از سرورهای تلگرام لود میشن
          files: output/${{ env.FILENAME }}
          make_latest: true
